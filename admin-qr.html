<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UbiPet — Imprimir QRs</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body { background: var(--cream); }

    /* ─── filtros ─ */
    .toolbar {
      background: var(--white);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      box-shadow: 0 2px 12px rgba(44,32,22,0.08);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .toolbar .logo {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      color: var(--clay);
      margin-right: 8px;
    }
    .toolbar .logo span { color: var(--sage); }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 2px solid var(--sand);
      background: var(--white);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--ink-soft);
    }
    .filter-btn.active {
      background: var(--clay);
      border-color: var(--clay);
      color: white;
    }

    /* ─── grid ─ */
    .qr-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ─── card ─ */
    .qr-card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 12px;
    }
    .qr-card .code {
      font-family: monospace;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 3px;
      color: var(--clay);
    }
    .qr-card .estado-badge {
      font-size: 12px;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .qr-card .qr-wrap {
      width: 180px;
      height: 180px;
    }
    .qr-card .mascota-info {
      text-align: center;
      font-size: 13px;
      color: var(--ink-soft);
      line-height: 1.5;
    }
    .qr-card .mascota-info strong { color: var(--ink); font-size: 15px; }
    .qr-card .url-small {
      font-size: 10px;
      color: #aaa;
      word-break: break-all;
      text-align: center;
    }

    /* ─── PRINT ─ */
    @media print {
      .toolbar { display: none !important; }
      body { background: white; }
      .qr-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        padding: 0;
      }
      .qr-card {
        box-shadow: none;
        border: 1px solid #eee;
        page-break-inside: avoid;
      }
    }

    .empty { text-align: center; padding: 80px 20px; color: var(--ink-soft); }
    .empty .icon { font-size: 56px; margin-bottom: 12px; }
  </style>
</head>
<body>

  <div class="toolbar">
    <span class="logo">Ubi<span>Pet</span> 🐾</span>

    <button class="filter-btn active" data-filter="todas">Todas</button>
    <button class="filter-btn" data-filter="disponible">⏳ Disponibles</button>
    <button class="filter-btn" data-filter="activa">✅ Activas</button>

    <div style="margin-left:auto; display:flex; gap:10px; flex-wrap:wrap;">
      <a href="admin.html" class="btn btn-ghost" style="font-size:13px; padding:8px 16px;">← Admin</a>
      <button class="btn btn-ghost" id="btnDescargarTodos" style="font-size:13px; padding:8px 16px;">⬇️ Descargar todos</button>
      <button class="btn btn-primary" onclick="window.print()" style="font-size:13px; padding:8px 16px;">🖨️ Imprimir</button>
    </div>
  </div>

  <div id="status" style="text-align:center; padding:20px; color:var(--ink-soft); font-weight:600;">
    🔍 Cargando placas...
  </div>

  <div class="qr-grid" id="qrGrid"></div>

  <script type="module">
    import { supabase } from '/js/supabase.js'

    // ─── VERIFICAR ADMIN ─────────────────────────
    const { data: { session } } = await supabase.auth.getSession()
    if (!session) { window.location.href = '/index.html'; throw new Error('No session') }

    const { data: adminData } = await supabase
      .from('admins').select('rol, activo').eq('email', session.user.email).maybeSingle()
    if (!adminData?.activo) { window.location.href = '/index.html'; throw new Error('No admin') }

    let todasLasPlacas = []
    let filtroActual   = 'todas'

    // ─── cargar ──────────────────────────────────
    async function cargar() {
      const { data, error } = await supabase
        .from('placas')
        .select('*, perfiles(nombre_mascota, nombre_dueno, id)')
        .order('codigo')

      if (error) {
        document.getElementById('status').textContent = '❌ Error: ' + error.message
        return
      }

      todasLasPlacas = data || []
      renderizar()
    }

    // ─── renderizar ───────────────────────────────
    function renderizar() {
      const filtradas = filtroActual === 'todas'
        ? todasLasPlacas
        : todasLasPlacas.filter(p => p.estado === filtroActual)

      const grid = document.getElementById('qrGrid')
      document.getElementById('status').textContent =
        `${filtradas.length} placas${filtroActual !== 'todas' ? ' ' + filtroActual + 's' : ''}`

      if (!filtradas.length) {
        grid.innerHTML = `
          <div class="empty" style="grid-column:1/-1;">
            <div class="icon">🏷️</div>
            <p>No hay placas en esta categoría</p>
          </div>
        `
        return
      }

      grid.innerHTML = ''
      filtradas.forEach((placa, i) => {
        const perfil   = Array.isArray(placa.perfiles) ? placa.perfiles[0] : placa.perfiles
        const perfilId = perfil?.id
        // Placa activa → rescate | Placa disponible → registro con código pre-cargado
        const qrUrl    = perfilId
          ? `${window.location.origin}/rescate.html?id=${perfilId}`
          : `${window.location.origin}/index.html?placa=${encodeURIComponent(placa.codigo)}`

        const card = document.createElement('div')
        card.className = 'qr-card'

        const estadoColor = placa.estado === 'activa'
          ? 'background:#e8f5e8; color:#2e7d32;'
          : 'background:#fff3e0; color:#e65100;'

        card.innerHTML = `
          <div class="code">${placa.codigo}</div>
          <div class="qr-wrap" style="position:relative;display:inline-block;" id="qr-${placa.id}">
            <div class="qr-logo-overlay" id="logo-${placa.id}" style="
              display:none;
              position:absolute;
              top:50%; left:50%;
              transform:translate(-50%,-50%);
              width:36px; height:36px;
              background:white;
              border-radius:6px;
              padding:3px;
              box-shadow:0 1px 4px rgba(0,0,0,0.15);
            ">
              <img src="/img/logo-green.png" style="width:100%;height:100%;object-fit:contain;">
            </div>
          </div>
          <div style="font-family:'Fraunces',serif; font-size:13px; font-weight:700; color:var(--clay); margin-top:6px; letter-spacing:1px;">¡UbiPet!</div>
          <button onclick="descargarQR('${placa.id}','${placa.codigo}')" style="
            margin-top:4px; background:var(--sand); border:1px solid var(--input-border);
            border-radius:8px; padding:6px 14px; font-size:12px; font-weight:700;
            color:var(--clay); cursor:pointer; font-family:'Nunito',sans-serif;
          ">⬇️ Descargar PNG</button>
        `

        grid.appendChild(card)

        // generar QR después del DOM
        setTimeout(() => {
          new QRCode(document.getElementById(`qr-${placa.id}`), {
            text: qrUrl,
            width: 180,
            height: 180,
            colorDark: '#2c2016',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
          })
          // mostrar logo overlay después que el QR se renderice
          setTimeout(() => {
            document.getElementById(`logo-${placa.id}`).style.display = 'block'
          }, 100)
        }, i * 50)
      })
    }

    // ─── filtros ──────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
        this.classList.add('active')
        filtroActual = this.dataset.filter
        renderizar()
      })
    })

    // ─── DESCARGAR QR ─────────────────────────────
    function getQRCanvas(placaId) {
      const wrap = document.getElementById('qr-' + placaId)
      return wrap ? wrap.querySelector('canvas') : null
    }

    window.descargarQR = async (placaId, codigo) => {
      const canvas = getQRCanvas(placaId)
      if (!canvas) return alert('QR no generado aún')

      // ── Dimensiones a 300 DPI para 4cm (~472px) ──
      const DPI    = 300
      const CM     = DPI / 2.54
      const W      = Math.round(4 * CM)   // 472px ≈ 4cm
      const PAD    = Math.round(0.25 * CM) // 3mm padding
      const QR_S   = W - PAD * 2          // QR ocupa casi todo el ancho
      const CODE_H = Math.round(0.45 * CM) // altura zona código arriba
      const UBIH   = Math.round(0.4 * CM)  // altura zona UbiPet abajo
      const H      = PAD + CODE_H + PAD/2 + QR_S + PAD/2 + UBIH + PAD

      const final = document.createElement('canvas')
      final.width  = W
      final.height = H
      const ctx = final.getContext('2d')

      // Fondo blanco
      ctx.fillStyle = '#ffffff'
      ctx.fillRect(0, 0, W, H)

      // ── Borde fino ──
      ctx.strokeStyle = '#dddddd'
      ctx.lineWidth = 2
      ctx.strokeRect(1, 1, W-2, H-2)

      // ── Código arriba ──
      const codeFontSize = Math.round(CODE_H * 0.72)
      ctx.fillStyle = '#D08C61'
      ctx.font = `900 ${codeFontSize}px monospace`
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.fillText(codigo, W/2, PAD + CODE_H/2)

      // ── QR ──
      const qrY = PAD + CODE_H + PAD/2
      ctx.drawImage(canvas, PAD, qrY, QR_S, QR_S)

      // ── Logo verde al centro del QR ──
      await new Promise(resolve => {
        const logoImg = new Image()
        logoImg.crossOrigin = 'anonymous'
        logoImg.onload = () => {
          const logoSize = Math.round(QR_S * 0.18)
          const lx = PAD + (QR_S - logoSize) / 2
          const ly = qrY + (QR_S - logoSize) / 2
          // Fondo blanco detrás del logo
          ctx.fillStyle = '#ffffff'
          ctx.beginPath()
          ctx.roundRect(lx - 3, ly - 3, logoSize + 6, logoSize + 6, 4)
          ctx.fill()
          ctx.drawImage(logoImg, lx, ly, logoSize, logoSize)
          resolve()
        }
        logoImg.onerror = resolve
        logoImg.src = '/img/logo-green.png'
      })

      // ── ¡UbiPet! abajo ──
      const ubiY = qrY + QR_S + PAD/2 + UBIH/2
      const ubiFontSize = Math.round(UBIH * 0.65)
      ctx.fillStyle = '#D08C61'
      ctx.font = `bold ${ubiFontSize}px serif`
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.fillText('¡UbiPet!', W/2, ubiY)

      // ── Descargar ──
      const link = document.createElement('a')
      link.download = `QR-${codigo}.png`
      link.href = final.toDataURL('image/png')
      link.click()
    }

    document.getElementById('btnDescargarTodos').addEventListener('click', async () => {
      const btn = document.getElementById('btnDescargarTodos')
      btn.disabled = true

      const placas = filtroActual === 'todas'
        ? todasLasPlacas
        : todasLasPlacas.filter(p => p.estado === filtroActual)

      const total = placas.filter(p => getQRCanvas(p.id)).length
      if (!total) { btn.disabled = false; return alert('No hay QRs generados aún') }

      const zip = new JSZip()
      let count = 0

      for (const placa of placas) {
        const canvas = getQRCanvas(placa.id)
        if (!canvas) continue

        count++
        btn.textContent = `⏳ ${count}/${total}...`

        // Generar el card completo igual que descargarQR pero retornar base64
        const DPI    = 300
        const CM     = DPI / 2.54
        const W      = Math.round(4 * CM)
        const PAD    = Math.round(0.25 * CM)
        const QR_S   = W - PAD * 2
        const CODE_H = Math.round(0.45 * CM)
        const UBIH   = Math.round(0.4 * CM)
        const H      = PAD + CODE_H + PAD/2 + QR_S + PAD/2 + UBIH + PAD

        const final = document.createElement('canvas')
        final.width  = W
        final.height = H
        const ctx = final.getContext('2d')

        ctx.fillStyle = '#ffffff'
        ctx.fillRect(0, 0, W, H)
        ctx.strokeStyle = '#dddddd'
        ctx.lineWidth = 2
        ctx.strokeRect(1, 1, W-2, H-2)

        const codeFontSize = Math.round(CODE_H * 0.72)
        ctx.fillStyle = '#D08C61'
        ctx.font = `900 ${codeFontSize}px monospace`
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.fillText(placa.codigo, W/2, PAD + CODE_H/2)

        const qrY = PAD + CODE_H + PAD/2
        ctx.drawImage(canvas, PAD, qrY, QR_S, QR_S)

        await new Promise(resolve => {
          const logoImg = new Image()
          logoImg.crossOrigin = 'anonymous'
          logoImg.onload = () => {
            const logoSize = Math.round(QR_S * 0.18)
            const lx = PAD + (QR_S - logoSize) / 2
            const ly = qrY + (QR_S - logoSize) / 2
            ctx.fillStyle = '#ffffff'
            ctx.beginPath()
            ctx.roundRect(lx - 3, ly - 3, logoSize + 6, logoSize + 6, 4)
            ctx.fill()
            ctx.drawImage(logoImg, lx, ly, logoSize, logoSize)
            resolve()
          }
          logoImg.onerror = resolve
          logoImg.src = '/img/logo-green.png'
        })

        const ubiY = qrY + QR_S + PAD/2 + UBIH/2
        const ubiFontSize = Math.round(UBIH * 0.65)
        ctx.fillStyle = '#D08C61'
        ctx.font = `bold ${ubiFontSize}px serif`
        ctx.textAlign = 'center'
        ctx.textBaseline = 'middle'
        ctx.fillText('¡UbiPet!', W/2, ubiY)

        // Convertir a blob y agregar al ZIP
        const dataUrl = final.toDataURL('image/png')
        const base64  = dataUrl.split(',')[1]
        zip.file(`QR-${placa.codigo}.png`, base64, { base64: true })
      }

      btn.textContent = '📦 Generando ZIP...'
      const blob = await zip.generateAsync({ type: 'blob' })
      const link = document.createElement('a')
      link.download = `UbiPet-QRs-${new Date().toISOString().slice(0,10)}.zip`
      link.href = URL.createObjectURL(blob)
      link.click()

      btn.disabled = false
      btn.textContent = '⬇️ Descargar todos'
    })

    cargar()
  </script>
</body>
</html>
