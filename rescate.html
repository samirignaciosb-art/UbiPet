<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UbiPet — Mascota encontrada 🐾</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 40px;
      background: var(--cream);
      position: relative;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      opacity: 0.6;
      transition: background 0.4s;
    }
    body.perdida::before {
      background: radial-gradient(ellipse at top, rgba(192,57,43,0.08) 0%, transparent 60%);
    }
    body.ok::before {
      background: radial-gradient(ellipse at top, rgba(90,138,106,0.08) 0%, transparent 60%);
    }

    /* ── CARD ── */
    .rescue-card {
      width: 100%; max-width: 400px;
      position: relative; z-index: 1;
      animation: fadeUp 0.5s var(--ease) both;
    }

    /* ── HEADER ── */
    .rescue-header {
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      padding: 32px 28px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .rescue-header::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.08);
      pointer-events: none;
    }
    .rescue-header.perdida { background: linear-gradient(145deg, #c0392b, #96281b); }
    .rescue-header.ok      { background: linear-gradient(145deg, #5a8a6a, #3d6b50); }

    .rescue-header h1 {
      font-family: 'Fraunces', serif;
      font-size: 26px; font-weight: 700;
      color: white; margin-bottom: 4px;
      position: relative; z-index: 1;
    }
    .rescue-header p {
      color: rgba(255,255,255,0.82);
      font-size: 14px; line-height: 1.5;
      position: relative; z-index: 1;
    }

    /* ── FOTO ── */
    .foto-wrap {
      position: relative; z-index: 1;
      margin-bottom: 16px; display: inline-block;
    }
    .mascota-foto {
      width: 96px; height: 96px;
      border-radius: 50%; object-fit: cover;
      border: 3px solid rgba(255,255,255,0.9);
      box-shadow: 0 6px 24px rgba(0,0,0,0.25);
      display: block;
    }
    .mascota-placeholder {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: 3px solid rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 44px;
    }
    .estado-badge {
      position: absolute; bottom: -2px; right: -2px;
      width: 28px; height: 28px; border-radius: 50%;
      background: white; display: flex; align-items: center;
      justify-content: center; font-size: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* ── BODY ── */
    .rescue-body {
      background: var(--card-bg);
      padding: 6px 0;
      border: 1px solid var(--card-border);
      border-top: none; border-bottom: none;
    }

    .info-row {
      display: flex; align-items: center;
      gap: 16px; padding: 14px 24px;
      border-bottom: 1px solid var(--card-border);
      transition: background var(--duration-fast);
    }
    .info-row:last-child { border-bottom: none; }
    .info-icon {
      width: 38px; height: 38px;
      border-radius: var(--radius-sm);
      background: var(--cream-d);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .info-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--ink-muted); margin-bottom: 2px;
    }
    .info-value {
      font-size: 16px; font-weight: 600; color: var(--ink);
      line-height: 1.3;
    }

    /* ── ACCIONES ── */
    .action-section {
      background: var(--card-bg);
      border-radius: 0 0 var(--radius-xl) var(--radius-xl);
      padding: 20px 24px 24px;
      display: flex; flex-direction: column; gap: 10px;
      border: 1px solid var(--card-border); border-top: none;
    }

    .btn-ubicacion {
      background: #25D366; color: white;
      border: none; border-radius: var(--radius);
      padding: 16px; font-family: 'DM Sans', sans-serif;
      font-size: 16px; font-weight: 700; cursor: pointer;
      width: 100%; transition: all var(--duration-fast) var(--ease-bounce);
      box-shadow: 0 4px 16px rgba(37,211,102,0.35);
    }
    .btn-ubicacion:hover { background: #1fb855; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(37,211,102,0.45); }
    .btn-ubicacion:active { transform: translateY(0); }
    .btn-ubicacion:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-copiar {
      background: var(--cream-d); color: var(--ink-soft);
      border: 1.5px solid var(--sand); border-radius: var(--radius);
      padding: 12px; font-family: 'DM Sans', sans-serif;
      font-weight: 600; font-size: 14px; cursor: pointer;
      width: 100%; transition: all var(--duration-fast) var(--ease);
    }
    .btn-copiar:hover { background: var(--sand); border-color: var(--sand-d); }

    /* ── NOT FOUND ── */
    .not-found {
      text-align: center; padding: 60px 24px;
      color: var(--ink-muted); max-width: 320px;
      position: relative; z-index: 1;
    }
    .not-found .icon { font-size: 56px; margin-bottom: 16px; opacity: 0.7; }

    /* ── FOOTER ── */
    .rescue-footer {
      margin-top: 24px; text-align: center;
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 8px;
      opacity: 0.6;
    }
    .rescue-footer img { height: 20px; width: auto; }
    .rescue-footer span {
      font-family: 'Fraunces', serif; font-size: 16px;
      color: var(--clay);
    }
    .rescue-footer span em { color: var(--sage); font-style: normal; }
  </style>
</head>
<body>

  <div id="loadingSpinner" style="z-index:1; position:relative;"><div class="spinner"></div></div>

  <div id="rescueCard" class="rescue-card" style="display:none;">

    <!-- HEADER -->
    <div class="rescue-header" id="rescueHeader">
      <div class="foto-wrap">
        <div id="fotoPet" class="mascota-placeholder">🐾</div>
        <div class="estado-badge" id="estadoBadge">🐾</div>
      </div>
      <h1 id="headerTitle">Mascota encontrada</h1>
      <p id="headerSub">Ayudá a esta mascota a volver a casa</p>
    </div>

    <!-- INFO -->
    <div class="rescue-body">
      <div class="info-row">
        <div class="info-icon">🐾</div>
        <div>
          <div class="info-label">Nombre</div>
          <div class="info-value" id="infoNombre">—</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon">🦴</div>
        <div>
          <div class="info-label">Raza</div>
          <div class="info-value" id="infoRaza">—</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon">👤</div>
        <div>
          <div class="info-label">Dueño</div>
          <div class="info-value" id="infoDueno">—</div>
        </div>
      </div>
      <div class="info-row">
        <div class="info-icon">📱</div>
        <div>
          <div class="info-label">WhatsApp</div>
          <div class="info-value" id="infoTel">—</div>
        </div>
      </div>
      <div class="info-row" id="rowDescripcion" style="display:none;">
        <div class="info-icon">📝</div>
        <div>
          <div class="info-label">Descripción</div>
          <div class="info-value" id="infoDesc" style="font-size:14px; font-weight:400; color:var(--ink-soft);">—</div>
        </div>
      </div>
    </div>

    <!-- ACCIONES -->
    <div class="action-section">
      <button class="btn-ubicacion" id="btnUbicacion">
        📍 Enviar mi ubicación al dueño
      </button>
      <button class="btn-copiar" id="btnCopiarTel">
        📋 Copiar número de WhatsApp
      </button>
    </div>

  </div>

  <!-- NOT FOUND -->
  <div id="notFound" class="not-found" style="display:none;">
    <div class="icon">😕</div>
    <h3 style="margin-bottom:8px; color:var(--ink);">QR no encontrado</h3>
    <p>Este código no está asociado a ningún perfil activo en UbiPet.</p>
  </div>

  <!-- FOOTER -->
  <div class="rescue-footer">
    <img src="/img/logo-green.png" alt="UbiPet">
    <span>Ubi<em>Pet</em></span>
  </div>

  <script type="module">
    import { supabase } from '/js/supabase.js'

    async function notificarDueno(data) {
      try {
        await fetch('/.netlify/functions/send-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email_dueno: data.email_dueno, nombre_mascota: data.nombre_mascota,
            nombre_dueno: data.nombre_dueno, telefono: data.telefono
          })
        })
      } catch(e) { console.log('Email error:', e) }
      try {
        await fetch('https://ubipet-push.samirignaciosb-art.workers.dev/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: data.user_id,
            title: '🐾 ¡Escanearon el QR de ' + (data.nombre_mascota || 'tu mascota') + '!',
            body:  'Alguien encontró a ' + (data.nombre_mascota || 'tu mascota') + '. Revisá la app.',
            url:   '/perfil.html'
          })
        })
      } catch(e) { console.log('Push error:', e) }
    }

    const perfilId = new URLSearchParams(window.location.search).get('id')

    function mostrarNoEncontrado() {
      document.getElementById('loadingSpinner').style.display = 'none'
      document.getElementById('notFound').style.display = 'block'
    }

    if (!perfilId) { mostrarNoEncontrado() }
    else {
      const { data, error } = await supabase.from('perfiles').select('*').eq('id', perfilId).single()
      document.getElementById('loadingSpinner').style.display = 'none'

      if (error || !data) { mostrarNoEncontrado() }
      else {
        if (data.email_dueno) notificarDueno(data)

        const perdida = data.esta_perdida

        // Fondo dinámico
        document.body.classList.add(perdida ? 'perdida' : 'ok')

        // Header
        document.getElementById('rescueHeader').className = 'rescue-header ' + (perdida ? 'perdida' : 'ok')
        document.getElementById('headerTitle').textContent = perdida ? '¡Mascota perdida!' : 'Mascota encontrada'
        document.getElementById('headerSub').textContent   = perdida
          ? 'El dueño está buscando a esta mascota'
          : 'Ayudá a esta mascota a volver a casa'
        document.getElementById('estadoBadge').textContent = perdida ? '🚨' : '✅'

        // Foto
        const fotoPet = document.getElementById('fotoPet')
        if (data.foto_url) {
          const img = document.createElement('img')
          img.src = data.foto_url; img.className = 'mascota-foto'; img.alt = data.nombre_mascota || 'Mascota'
          fotoPet.replaceWith(img)
        } else {
          fotoPet.textContent = perdida ? '🚨' : '🐾'
        }

        // Datos
        document.getElementById('infoNombre').textContent = data.nombre_mascota || '—'
        document.getElementById('infoRaza').textContent   = data.raza || 'No especificada'
        document.getElementById('infoDueno').textContent  = data.nombre_dueno || '—'
        document.getElementById('infoTel').textContent    = data.telefono || '—'
        if (data.descripcion) {
          document.getElementById('infoDesc').textContent = data.descripcion
          document.getElementById('rowDescripcion').style.display = 'flex'
        }

        document.getElementById('rescueCard').style.display = 'block'

        // Botón ubicación
        document.getElementById('btnUbicacion').addEventListener('click', function() {
          const btn = this
          btn.textContent = '⏳ Obteniendo GPS...'; btn.disabled = true

          if (!navigator.geolocation) {
            alert('Tu navegador no soporta GPS. Compartí tu ubicación manualmente.')
            btn.textContent = '📍 Enviar mi ubicación al dueño'; btn.disabled = false
            return
          }

          navigator.geolocation.getCurrentPosition(
            pos => {
              const lat = pos.coords.latitude.toFixed(6)
              const lng = pos.coords.longitude.toFixed(6)
              const tel = data.telefono.replace(/[^0-9]/g, '')
              const msg = `🐾 *¡Encontré a ${data.nombre_mascota}!*\n\n📍 *Mi ubicación actual:*\nhttps://maps.google.com/maps?q=${lat},${lng}\n\nEstoy esperando aquí con tu mascota. ¡Avisame cuando venís! 🙏`
              btn.textContent = '✅ ¡Abriendo WhatsApp...'; btn.disabled = false
              window.location.href = `https://wa.me/${tel}?text=${encodeURIComponent(msg)}`
            },
            err => {
              const tel = data.telefono.replace(/[^0-9]/g, '')
              const msg = `🐾 ¡Encontré a ${data.nombre_mascota}! No pude compartir mi ubicación GPS. Por favor contactame.`
              btn.textContent = '📍 Enviar mi ubicación al dueño'; btn.disabled = false
              window.location.href = `https://wa.me/${tel}?text=${encodeURIComponent(msg)}`
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
          )
        })

        // Botón copiar
        document.getElementById('btnCopiarTel').addEventListener('click', function() {
          navigator.clipboard.writeText(data.telefono).then(() => {
            this.textContent = '✅ ¡Número copiado!'
            setTimeout(() => { this.textContent = '📋 Copiar número de WhatsApp' }, 2000)
          })
        })
      }
    }
  </script>
</body>
</html>
